kind: Component
category: meta
metadata:
  name: domain
  description: null
options:
  ingress-class:
    default: traefik
    examples:
    - traefik
    type: string
  default-dist:
    default: core
    examples:
    - core
    type: string
  metas:
    default: []
    items:
      type: object
    type: array
  domain-name:
    default: your_company.com
    examples:
    - your_company.com
    type: string
  issuer:
    default: letsencrypt-prod
    examples:
    - letsencrypt-prod
    type: string
dependencies: []
providers:
  kubernetes: true
  authentik: null
  kubectl: null
  postgresql: null
  restapi: null
