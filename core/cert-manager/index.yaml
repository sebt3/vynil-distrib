---
apiVersion: vinyl.solidite.fr/v1beta1
kind: Component
category: core
metadata:
  name: cert-manager
  description: |-
    Cloud native certificate management
    X.509 certificate management for Kubernetes
options:
  release:
    description: cert-manager version to use
    default: 1.11.0
    type: string
  images:
    default:
      cainjector:
        registry: quay.io
        repository: jetstack/cert-manager-cainjector
        tag: v1.11.0
      controller:
        registry: quay.io
        repository: jetstack/cert-manager-controller
        tag: v1.11.0
      startupapicheck:
        registry: quay.io
        repository: jetstack/cert-manager-ctl
        tag: v1.11.0
      webhook:
        registry: quay.io
        repository: jetstack/cert-manager-webhook
        tag: v1.11.0
    type: object
    properties:
      cainjector:
        default:
          registry: quay.io
          repository: jetstack/cert-manager-cainjector
          tag: v1.11.0
        type: object
        properties:
          registry:
            default: quay.io
            type: string
          repository:
            default: jetstack/cert-manager-cainjector
            type: string
          tag:
            default: v1.11.0
            type: string
      controller:
        default:
          registry: quay.io
          repository: jetstack/cert-manager-controller
          tag: v1.11.0
        type: object
        properties:
          registry:
            default: quay.io
            type: string
          repository:
            default: jetstack/cert-manager-controller
            type: string
          tag:
            default: v1.11.0
            type: string
      startupapicheck:
        default:
          registry: quay.io
          repository: jetstack/cert-manager-ctl
          tag: v1.11.0
        type: object
        properties:
          registry:
            default: quay.io
            type: string
          repository:
            default: jetstack/cert-manager-ctl
            type: string
          tag:
            default: v1.11.0
            type: string
      webhook:
        default:
          registry: quay.io
          repository: jetstack/cert-manager-webhook
          tag: v1.11.0
        type: object
        properties:
          registry:
            default: quay.io
            type: string
          repository:
            default: jetstack/cert-manager-webhook
            type: string
          tag:
            default: v1.11.0
            type: string
