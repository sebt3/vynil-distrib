---
apiVersion: vinyl.solidite.fr/v1beta1
kind: Component
category: core
metadata:
  name: cert-manager
  description: |-
    Cloud native certificate management
    X.509 certificate management for Kubernetes
options:
  release:
    default: 1.12.1
    description: cert-manager version to use
    examples:
    - 1.12.1
    type: string
  images:
    default:
      cainjector:
        registry: quay.io
        repository: jetstack/cert-manager-cainjector
        tag: v1.12.1
      controller:
        registry: quay.io
        repository: jetstack/cert-manager-controller
        tag: v1.12.1
      startupapicheck:
        registry: quay.io
        repository: jetstack/cert-manager-ctl
        tag: v1.12.1
      webhook:
        registry: quay.io
        repository: jetstack/cert-manager-webhook
        tag: v1.12.1
    examples:
    - cainjector:
        registry: quay.io
        repository: jetstack/cert-manager-cainjector
        tag: v1.12.1
      controller:
        registry: quay.io
        repository: jetstack/cert-manager-controller
        tag: v1.12.1
      startupapicheck:
        registry: quay.io
        repository: jetstack/cert-manager-ctl
        tag: v1.12.1
      webhook:
        registry: quay.io
        repository: jetstack/cert-manager-webhook
        tag: v1.12.1
    properties:
      cainjector:
        default:
          registry: quay.io
          repository: jetstack/cert-manager-cainjector
          tag: v1.12.1
        properties:
          registry:
            default: quay.io
            type: string
          repository:
            default: jetstack/cert-manager-cainjector
            type: string
          tag:
            default: v1.12.1
            type: string
        type: object
      controller:
        default:
          registry: quay.io
          repository: jetstack/cert-manager-controller
          tag: v1.12.1
        properties:
          registry:
            default: quay.io
            type: string
          repository:
            default: jetstack/cert-manager-controller
            type: string
          tag:
            default: v1.12.1
            type: string
        type: object
      startupapicheck:
        default:
          registry: quay.io
          repository: jetstack/cert-manager-ctl
          tag: v1.12.1
        properties:
          registry:
            default: quay.io
            type: string
          repository:
            default: jetstack/cert-manager-ctl
            type: string
          tag:
            default: v1.12.1
            type: string
        type: object
      webhook:
        default:
          registry: quay.io
          repository: jetstack/cert-manager-webhook
          tag: v1.12.1
        properties:
          registry:
            default: quay.io
            type: string
          repository:
            default: jetstack/cert-manager-webhook
            type: string
          tag:
            default: v1.12.1
            type: string
        type: object
    type: object
dependencies: []
providers: null
