---
apiVersion: vinyl.solidite.fr/v1beta1
kind: Component
category: share
metadata:
  name: authentik-forward
  description: null
options:
  issuer:
    default: letsencrypt-prod
    examples:
    - letsencrypt-prod
    type: string
  ingress-class:
    default: traefik
    examples:
    - traefik
    type: string
  sub-domain:
    default: null
  domain-name:
    default: your_company.com
    examples:
    - your_company.com
    type: string
  domain:
    default: your-company
    examples:
    - your-company
    type: string
dependencies: []
providers:
  kubernetes: true
  authentik: true
  kubectl: null
  postgresql: null
  restapi: null
  http: true
