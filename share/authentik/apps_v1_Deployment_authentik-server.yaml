# Source: authentik/templates/server-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
  labels:
    helm.sh/chart: authentik-2023.5.3
    app.kubernetes.io/name: authentik
    app.kubernetes.io/instance: authentik
    app.kubernetes.io/version: "2023.5.3"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: "server"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: authentik
      app.kubernetes.io/instance: authentik
      app.kubernetes.io/component: "server"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authentik
        app.kubernetes.io/instance: authentik
        app.kubernetes.io/component: "server"
        app.kubernetes.io/version: "2023.5.3"
      annotations:
        goauthentik.io/config-checksum: 81fdcfe9147f31c089ec3abb4103e85a0373191a40df8b67827f4749a1139958
    spec:
      enableServiceLinks: true
      securityContext:
        {}
      containers:
        - name: authentik
          image: "ghcr.io/goauthentik/server:2023.5.3"
          imagePullPolicy: "IfNotPresent"
          args: ["server"]
          env:
          envFrom:
            - secretRef:
                name: authentik
          volumeMounts:
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP
            - name: http-metrics
              containerPort: 9300
              protocol: TCP
            - name: https
              containerPort: 9443
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /-/health/live/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            failureThreshold: 60
            httpGet:
              path: /-/health/live/
              port: http
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /-/health/ready/
              port: http
            periodSeconds: 10
          securityContext:
            {}
      volumes: